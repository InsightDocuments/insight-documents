<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Documents</title>
</head>
<body>
    <h1>Welcome to Insight Documents</h1>

    <!-- File Upload Section -->
    <h2>Upload your PDF file</h2>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file">
        <button type="submit">Upload</button>
    </form>

    <!-- Search Section -->
    <h2>Search Your Documents</h2>
    <form action="/search" method="post">
        <label for="file_name">File Name:</label>
        <input type="text" id="file_name" name="file_name" placeholder="Enter the uploaded file">
        <label for="query">Query:</label>
        <input type="text" id="query" name="query" placeholder="Enter your question">
        <button type="submit">Search</button>
    </form>
</body>
</html>
